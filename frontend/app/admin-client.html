<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Nut Report Admin Client View</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #09101d; color: #eef4ff; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 28px; }
    .panel { background: #0f1728; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric { border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 12px; background: rgba(255,255,255,.03); }
    .metric strong { display: block; font-size: 24px; margin-top: 6px; }
    .eyebrow { color: #94a3c7; text-transform: uppercase; letter-spacing: .08em; font-size: 12px; margin-bottom: 8px; }
    .muted { color: #94a3c7; }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .row:last-child { border-bottom: 0; }
    .logo-lockup { display: flex; justify-content: center; margin: 0 auto 10px; }
    .logo-lockup img { width: min(220px, 50vw); height: auto; display: block; filter: drop-shadow(0 10px 28px rgba(0,0,0,.28)); }
    a { color: #7fb0ff; }
    @media (max-width: 900px) {
      .wrap { padding: 16px; }
      .grid, .metric-grid { grid-template-columns: 1fr; }
      .row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-lockup">
      <img src="./assets/nut-report-logo.png" alt="The Nut Report logo" />
    </div>

    <div class="panel">
      <p><a href="./admin.html">← Back to admin</a></p>
      <h1 id="title">Client view</h1>
      <p id="subtitle" class="muted">Loading client report…</p>
    </div>

    <div id="app">Loading…</div>
  </div>
  <script type="module" src="./admin-client.js"></script>
</body>
</html>
