<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Nut Report App</title>
  <style>
    :root {
      --bg: #09101d;
      --panel: #0f1728;
      --text: #eff4ff;
      --muted: #94a3c7;
      --line: rgba(255,255,255,.08);
      --blue: #5b8cff;
      --green: #34d399;
      --yellow: #fbbf24;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: linear-gradient(180deg, #08101d 0%, #0b1424 100%); color: var(--text); }
    .wrap { max-width: 1260px; margin: 0 auto; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 22px; }
    .title h1 { margin: 0; font-size: 30px; }
    .title p { margin: 8px 0 0; color: var(--muted); max-width: 760px; line-height: 1.5; }
    .badge { border: 1px solid rgba(91,140,255,.35); background: rgba(91,140,255,.12); color: #d5e2ff; padding: 10px 14px; border-radius: 999px; font-size: 13px; }
    .nav { margin: 14px auto 0; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .nav-links { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .nav-links a { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,.12); background: linear-gradient(180deg, #16213a 0%, #111a2e 100%); color: #eef4ff; text-decoration: none; font-size: 13px; font-weight: 700; box-shadow: 0 10px 24px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.04); transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .nav-links a:hover { transform: translateY(-1px); border-color: rgba(91,140,255,.45); box-shadow: 0 14px 28px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05); }
    .nav-inline-control label { margin: 0; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .panel { background: rgba(15,23,40,.92); border: 1px solid var(--line); border-radius: 22px; box-shadow: 0 20px 60px rgba(0,0,0,.28); padding: 20px; margin-bottom: 16px; backdrop-filter: blur(10px); }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 22px; align-items: start; }
    .card { padding: 14px; border-radius: 18px; border: 1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,.045) 0%, rgba(255,255,255,.02) 100%); margin-bottom: 14px; }
    .card h3, .panel h2 { margin: 0 0 10px; }
    .panel h2 { font-size: 20px; letter-spacing: -.02em; }
    .card p { font-size: 13px; color: var(--muted); line-height: 1.45; margin: 0; }
    .clientbar { margin-bottom: 18px; padding: 14px 16px; border-radius: 16px; background: linear-gradient(180deg, rgba(91,140,255,.16) 0%, rgba(91,140,255,.08) 100%); border: 1px solid rgba(91,140,255,.24); color: #dbe6ff; font-size: 13px; line-height: 1.45; }
    .alertbar { margin-bottom: 18px; padding: 16px 18px; border-radius: 16px; background: rgba(251,191,36,.12); border: 1px solid rgba(251,191,36,.26); color: #ffe08a; display: flex; justify-content: space-between; gap: 14px; align-items: center; }
    .alertbar strong { color: #fff1bf; }
    .alertbar a { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,.12); background: linear-gradient(180deg, #16213a 0%, #111a2e 100%); color: #eef4ff; text-decoration: none; font-size: 13px; font-weight: 800; white-space: nowrap; }
    .stepbar { display: grid; gap: 10px; margin-bottom: 18px; }
    .step { padding: 12px 14px; border-radius: 14px; background: rgba(255,255,255,.03); border: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .step strong { font-size: 14px; }
    .step span { color: var(--muted); font-size: 12px; }
    .step.active { border-color: rgba(91,140,255,.38); background: rgba(91,140,255,.12); }
    .field { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; }
    input, select { width: 100%; padding: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,.12); background: linear-gradient(180deg, #121d33 0%, #0f1728 100%); color: #eef4ff; box-shadow: inset 0 1px 0 rgba(255,255,255,.04); transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease; }
    input:focus, select:focus { outline: none; border-color: rgba(91,140,255,.6); box-shadow: 0 0 0 3px rgba(91,140,255,.16); }
    .nav-inline-control select { width: auto; min-width: 150px; padding: 8px 30px 8px 10px; border-radius: 10px; font-size: 12px; }
    select { appearance: none; -webkit-appearance: none; background-image: linear-gradient(45deg, transparent 50%, #94a3c7 50%), linear-gradient(135deg, #94a3c7 50%, transparent 50%); background-position: calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px); background-size: 6px 6px, 6px 6px; background-repeat: no-repeat; padding-right: 34px; }
    select option { background: #111a2e; color: #eef4ff; }
    .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    button, .actions a { padding: 12px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,.12); background: linear-gradient(180deg, #16213a 0%, #111a2e 100%); color: #eef4ff; cursor: pointer; font-weight: 800; letter-spacing: .01em; box-shadow: 0 10px 24px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.04); transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    button:hover, .actions a:hover { transform: translateY(-1px); border-color: rgba(91,140,255,.45); box-shadow: 0 14px 28px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.06); }
    button:active, .actions a:active { transform: translateY(0); }
    .btn-primary { background: linear-gradient(180deg, #6a97ff 0%, #4b7ef4 100%); border-color: rgba(91,140,255,.7); color: #f8fbff; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .stat { padding: 18px; border-radius: 20px; border: 1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
    .stat .k { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .stat .v { margin-top: 10px; font-size: 30px; font-weight: 800; }
    .stat .note { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .stat.blue .v { color: #a9c2ff; }
    .stat.green .v { color: #8cf0c4; }
    .stat.yellow .v { color: #ffd666; }
    .scoreline { margin-bottom: 18px; padding: 18px 20px; border-radius: 18px; background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.025) 100%); border: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
    .scoreline .big { font-size: 26px; font-weight: 900; letter-spacing: -.02em; }
    .scoreline .small { color: var(--muted); font-size: 13px; }
    .scoreline.good { border-color: rgba(52,211,153,.45); background: rgba(52,211,153,.12); }
    .scoreline.bad { border-color: rgba(251,191,36,.32); background: rgba(251,191,36,.12); }
    .scoreline.good .big { color: #8cf0c4; }
    .scoreline.bad .big { color: #ff9aac; }
    .week-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .week-shell { padding: 16px; border-radius: 18px; border: 1px solid var(--line); background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.025) 100%); cursor: pointer; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .week-shell:hover { transform: translateY(-2px); box-shadow: 0 16px 28px rgba(0,0,0,.18); border-color: rgba(91,140,255,.24); }
    .week-shell.active { border-color: rgba(91,140,255,.38); background: rgba(91,140,255,.12); }
    .week-shell.good { border-color: rgba(52,211,153,.45); background: rgba(52,211,153,.12); }
    .week-shell.bad { border-color: rgba(251,113,133,.45); background: rgba(251,113,133,.12); }
    .week-shell .title { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .week-shell .range { margin-top: 6px; font-size: 18px; font-weight: 800; }
    .week-shell .mini-note { margin-top: 10px; color: var(--muted); font-size: 13px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .control-panel { position: sticky; top: 18px; transition: opacity .18s ease, transform .18s ease; }
    .control-panel.mobile-hidden {
      opacity: 0;
      transform: translateY(-12px);
      pointer-events: none;
      height: 0;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
      border-width: 0;
    }
    .control-panel.mobile-hidden + section {
      margin-top: 18px;
    }
    .row { display: flex; justify-content: space-between; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .row:last-child { border-bottom: 0; }
    .row .label, .muted { color: var(--muted); }
    .profit-good { color: #8cf0c4; }
    .profit-bad { color: #ff9aac; }
    .tag { display: inline-block; margin-top: 10px; padding: 5px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .tag.live { background: rgba(52,211,153,.14); color: #9df0cb; border: 1px solid rgba(52,211,153,.24); }
    .tag.manual { background: rgba(251,191,36,.14); color: #ffe08a; border: 1px solid rgba(251,191,36,.22); }
    .session-banner-label, .session-banner-meta { color: var(--muted); }
    .session-banner-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 10px; }
    .session-banner-value { font-size: 18px; font-weight: 700; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(5,10,18,.72); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .modal-card { width: min(560px, 100%); background: linear-gradient(180deg, #111a2e 0%, #0d1526 100%); border: 1px solid rgba(255,255,255,.12); border-radius: 22px; padding: 22px; box-shadow: 0 24px 60px rgba(0,0,0,.35); }
    .modal-card h3 { margin: 0 0 10px; font-size: 24px; }
    .modal-card p { margin: 0 0 16px; color: var(--muted); line-height: 1.5; }
    .modal-card .actions { margin-top: 16px; }
    a { color: #7fb0ff; }
    @media (max-width: 980px) {
      .layout, .stats, .two, .week-nav { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
      .session-banner-grid { grid-template-columns: 1fr; }
      .row, .scoreline, .alertbar { flex-direction: column; align-items: flex-start; }
      .control-panel { position: relative; top: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>The Nut Report</h1>
        <p>The live dashboard shell is back in prototype mode: same feel, but every card is either live data or clearly manual instead of pretending.</p>
        <div class="nav">
          <div class="nav-links"><a href="./dashboard.html">Dashboard</a><a href="./ops.html">Ops</a><a href="./session.html">Session</a><a href="./crm.html">CRM</a><a href="./overrides.html">Overrides</a><a href="./sync.html">Sync</a><a href="./account.html">Account</a><a href="./login.html">Login</a><a href="./logout.html">Logout</a></div>
        </div>
      </div>
      <div class="badge">The Nut Report · Service Business Dashboard</div>
    </div>

    <div class="panel" id="sessionBanner">Loading session…</div>

    <div id="app"></div>
  </div>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
