<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Nut Report Login</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #09101d; color: #eef4ff; }
    .wrap { max-width: 520px; margin: 60px auto; padding: 28px; }
    .panel { background: #0f1728; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px; }
    label, input, select, button { display: block; width: 100%; margin-bottom: 12px; }
    input, select, button { padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15); background: #111a2e; color: #eef4ff; }
    .help { color: #94a3c7; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>The Nut Report Login</h1>
      <p>Sign in with email and password. If needed, you can still use a magic link fallback.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" value="chad@stopworkingbroke.com" type="email" />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" />
        <button type="submit">Sign In</button>
      </form>
      <button id="magicLinkButton" type="button">Use Magic Link Instead</button>
      <button id="setPasswordButton" type="button">Create / Reset Password</button>
      <div id="result"></div>
      <div class="help">This is not public signup. The email still needs to exist in the app database to resolve the right organization after login.</div>
    </div>
  </div>
  <script type="module" src="./login.js"></script>
</body>
</html>
