<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Nut Report CRM</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #09101d; color: #eef4ff; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px; }
    .panel { background: #0f1728; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    .row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.06); padding: 10px 0; }
    .row:last-child { border-bottom: 0; }
    .session-banner-label, .session-banner-meta { color: #94a3c7; }
    .session-banner-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 10px; }
    .session-banner-value { font-size: 18px; font-weight: 700; }
    label, input, select, textarea, button { display: block; width: 100%; margin-bottom: 10px; }
    input, select, textarea, button { padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15); background: #111a2e; color: #eef4ff; }
    textarea { min-height: 150px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    a { color: #7fb0ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>The Nut Report CRM Status</h1>
      <p><a href="./index.html">Dashboard</a> · <a href="./ops.html">Ops</a> · <a href="./crm.html">CRM</a> · <a href="./overrides.html">Overrides</a> · <a href="./sync.html">Sync</a> · <a href="./account.html">Account</a> · <a href="./login.html">Login</a> · <a href="./logout.html">Logout</a></p>
    </div>
    <div class="panel" id="sessionBanner">Loading session…</div>
    <div class="panel" id="statusCard">Loading…</div>
    <div class="panel">
      <h2>Connect Your CRM</h2>
      <p>Start with Housecall Pro. Save the connection here, then use <strong>Refresh Data</strong> on the dashboard to pull live numbers.</p>
      <form id="crmForm">
        <label for="provider">CRM Provider</label>
        <select id="provider"><option value="housecall_pro">Housecall Pro</option></select>
        <label for="accountLabel">Connection Name</label>
        <input id="accountLabel" value="Primary Housecall Pro account" />
        <label for="sessionCookie">Housecall Pro Session Cookie</label>
        <textarea id="sessionCookie" placeholder="Paste the session cookie here"></textarea>
        <label for="locationId">Location ID (optional)</label>
        <input id="locationId" placeholder="Leave blank if unknown" />
        <button type="submit">Save CRM Connection</button>
      </form>
      <div id="result"></div>
    </div>
  </div>
  <script type="module" src="./crm.js"></script>
</body>
</html>
