<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password · The Nut Report</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #09101d; color: #eef4ff; }
    .wrap { max-width: 520px; margin: 60px auto; padding: 28px; }
    .panel { background: #0f1728; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px; }
    label, input, button { display: block; width: 100%; margin-bottom: 12px; }
    input, button { padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15); background: #111a2e; color: #eef4ff; }
    #result a { display: inline-flex; margin-top: 10px; padding: 12px 16px; border-radius: 10px; background: linear-gradient(180deg, #6a97ff 0%, #4b7ef4 100%); color: #eef4ff; text-decoration: none; font-weight: 800; animation: nextPulse 1s ease-in-out infinite; box-shadow: 0 0 0 4px rgba(91,140,255,.18), 0 0 22px rgba(91,140,255,.28); }
    .help { color: #94a3c7; margin-top: 10px; }
    @keyframes nextPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(91,140,255,.18), 0 0 22px rgba(91,140,255,.28); }
      50% { box-shadow: 0 0 0 7px rgba(143,194,255,.34), 0 0 34px rgba(143,194,255,.55); }
    }
    @media (max-width: 720px) {
      .wrap { margin: 24px auto; padding: 16px; }
    }
  
    .logo-lockup { display: flex; justify-content: center; margin: 0 auto 24px; }
    .logo-lockup img { width: min(320px, 100%); height: auto; display: block; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.28); }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="logo-lockup">
      <img src="./assets/nut-report-logo.jpg" alt="The Nut Report logo" />
    </div>
    <div class="panel">
      <h1>Set Your Password</h1>
      <p>Create or reset your password for The Nut Report.</p>
      <form id="resetForm">
        <label for="password">New Password</label>
        <input id="password" type="password" placeholder="Enter a new password" required />
        <button type="submit">Save Password</button>
      </form>
      <div id="result"></div>
      <div class="help">After saving, use the dashboard button below. If you are returning later, your email and password will work on the login page.</div>
    </div>
  </div>
  <script type="module" src="./reset-password.js"></script>
</body>
</html>
