<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProfitStack Sync Runs</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #09101d; color: #eef4ff; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px; }
    .panel { background: #0f1728; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    .row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 12px; border-bottom: 1px solid rgba(255,255,255,.06); padding: 10px 0; }
    .row:last-child { border-bottom: 0; }
    .session-banner-label, .session-banner-meta { color: #94a3c7; }
    .session-banner-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 10px; }
    .session-banner-value { font-size: 18px; font-weight: 700; }
    label, input, select, textarea, button { display: block; width: 100%; margin-bottom: 10px; }
    input, select, textarea, button { padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15); background: #111a2e; color: #eef4ff; }
    textarea { min-height: 180px; resize: vertical; }
    a { color: #7fb0ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>ProfitStack Sync Runs</h1>
      <p><a href="./index.html">Dashboard</a> · <a href="./ops.html">Ops</a> · <a href="./crm.html">CRM</a> · <a href="./overrides.html">Overrides</a> · <a href="./sync.html">Sync</a> · <a href="./account.html">Account</a> · <a href="./login.html">Login</a> · <a href="./logout.html">Logout</a></p>
    </div>
    <div class="panel" id="sessionBanner">Loading session…</div>
    <div class="panel">
      <h2>Execute Snapshot Sync</h2>
      <label for="sourceLabel">Source Label</label>
      <input id="sourceLabel" value="manual sync snapshot" />
      <label for="snapshotJson">Snapshot JSON</label>
      <textarea id="snapshotJson" placeholder='{"weeks":[{"weekStartDate":"2026-03-30","weekEndDate":"2026-04-05","scheduledProduction":29228,"approvedSales":8385.8,"completedProduction":0,"opportunities":8}]}'></textarea>
      <button id="executeSyncButton" type="button">Execute Sync</button>
      <div class="muted">This writes raw snapshot + normalized week metrics + sync run history.</div>
    </div>
    <div class="panel">
      <h2>Log Sync Run</h2>
      <form id="syncForm">
        <label for="status">Status</label>
        <select id="status"><option value="success">success</option><option value="failed">failed</option></select>
        <label for="recordsPulled">Records Pulled</label>
        <input id="recordsPulled" value="12" />
        <label for="errorMessage">Error Message</label>
        <input id="errorMessage" value="" placeholder="Only needed for failed runs" />
        <button type="submit">Save Sync Run</button>
      </form>
      <div id="result"></div>
    </div>
    <div class="panel" id="app">Loading…</div>
  </div>
  <script type="module" src="./sync.js"></script>
</body>
</html>
