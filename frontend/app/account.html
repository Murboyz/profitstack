<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Nut Report Account</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #09101d; color: #eef4ff; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px; }
    .panel { background: #0f1728; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
    label, input, button { display: block; width: 100%; margin-bottom: 12px; }
    input, button { padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15); background: #111a2e; color: #eef4ff; }
    .session-banner-label, .session-banner-meta { color: #94a3c7; }
    .session-banner-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 10px; }
    .session-banner-value { font-size: 18px; font-weight: 700; }
    a { color: #7fb0ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>The Nut Report Account</h1>
      <p><a href="./index.html">Dashboard</a> · <a href="./ops.html">Ops</a> · <a href="./crm.html">CRM</a> · <a href="./overrides.html">Overrides</a> · <a href="./sync.html">Sync</a> · <a href="./account.html">Account</a> · <a href="./login.html">Login</a> · <a href="./logout.html">Logout</a></p>
    </div>
    <div class="panel" id="sessionBanner">Loading session…</div>
    <div id="app">Loading…</div>
    <div class="panel">
      <h2>Set / Change Password</h2>
      <form id="passwordForm">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" placeholder="Enter a new password" />
        <button type="submit">Save Password</button>
      </form>
      <div id="passwordResult"></div>
    </div>
  </div>
  <script type="module" src="./account.js"></script>
</body>
</html>
